databases:
  - name: wedding-db
    databaseName: wedding
    user: wedding
    plan: free

services:
  - type: web
    name: wedding-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wedding-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://wedding-frontend.onrender.com

  - type: web
    name: wedding-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://wedding-backend.onrender.com
      - key: NODE_VERSION
        value: 22
